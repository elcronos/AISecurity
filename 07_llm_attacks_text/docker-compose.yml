services:
  ollama:
    image: ollama/ollama:latest
    container_name: aisec_ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  app:
    build:
      context: ./app
    container_name: aisec_app
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-llama3.2:3b}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_models:
