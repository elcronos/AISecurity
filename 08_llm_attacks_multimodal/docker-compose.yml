services:
  ollama:
    image: ollama/ollama:latest
    container_name: aisec_mm_ollama
    volumes:
      - ollama_mm_models:/root/.ollama
    ports:
      - "11435:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  app:
    build:
      context: ./app
    container_name: aisec_mm_app
    ports:
      - "8081:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-llava:7b}
      MAX_IMAGE_MB: ${MAX_IMAGE_MB:-5}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_mm_models:
